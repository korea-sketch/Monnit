# Monnit Korea — Netlify 설정
# 빌드 시 build.js 가 robots.txt / sitemap.xml / llms.txt / llms-full.txt / pages/*.html 를 생성합니다.
[build]
  command = "node build.js"
  publish = "."

# Node 18+ (Function/ESM 없이 순수 CommonJS라 버전 민감도 낮음)
[build.environment]
  NODE_VERSION = "20"

# llms.txt 계열은 text/plain 으로 서빙
[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/llms-full.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

# 구 Wix 사이트 경로 정리 — 검색 색인에 남은 옛 블로그 URL을 네이버 블로그로 301
[[redirects]]
  from = "/monnitblog"
  to = "https://blog.naver.com/monnitkorea"
  status = 301

[[redirects]]
  from = "/monnitblog/*"
  to = "https://blog.naver.com/monnitkorea"
  status = 301

# 프로모션 랜딩: 깔끔한 URL(/promo/fire) → 범용 정적 페이지로 rewrite (주소 유지)
[[redirects]]
  from = "/promo/*"
  to = "/promo.html?id=:splat"
  status = 200

# 예전 소방 전용 페이지 → 범용 페이지로 통합 301
[[redirects]]
  from = "/promo-fire.html"
  to = "/promo.html?id=fire"
  status = 301

# 구 슬러그(대소문자·한글) 케이스 페이지 → 정식 소문자 URL 301 (색인 중복·404 정리)
[[redirects]]
  from = "/pages/case-Samsung.html"
  to = "/pages/case-samsung.html"
  status = 301

[[redirects]]
  from = "/pages/case-Veolia.html"
  to = "/pages/case-veolia.html"
  status = 301

[[redirects]]
  from = "/pages/case-HDC랩스.html"
  to = "/pages/case-hdc-labs.html"
  status = 301

[functions]
  directory = "netlify/functions"
