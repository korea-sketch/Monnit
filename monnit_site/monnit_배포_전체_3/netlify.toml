[build]
  publish = "monnit_site"

[[redirects]]
  from = "https://monnit.ai/*"
  to = "https://monnit.co.kr/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.monnit.ai/*"
  to = "https://monnit.co.kr/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.monnit.co.kr/*"
  to = "https://monnit.co.kr/:splat"
  status = 301
  force = true
